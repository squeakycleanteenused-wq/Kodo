<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koduninja — Euroopa teenuste platvorm</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-main: #FDFCF9;
    --bg-card: rgba(255, 255, 255, 0.98);
    --forest: #1A3326;
    --sage: #5C8A6E;
    --gold: #C9A84C;
    --text: #2D3436; 
    --text-light: #636E72;
    --border: #EFEBE3;
    --pattern-color: #1A3326; 
    --pattern-opacity: 0.1; 
    --shadow: 0 10px 40px rgba(26,51,38,0.05);
  }

  body.dark-mode {
    --bg-main: #0F1713;
    --bg-card: rgba(24, 38, 32, 0.95);
    --text: #EFEBE3;
    --text-light: #A0AEC0;
    --border: #1F2F27;
    --pattern-color: #C9A84C;
    --pattern-opacity: 0.05;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: all 0.3s ease; }

  body {
    background-color: var(--bg-main);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(circle at 2px 2px, var(--pattern-color) 1px, transparent 0);
    background-size: 40px 40px;
  }

  /* Login Screen - See, mis sul pildil oli */
  #login-screen { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; }
  .login-card {
    background: var(--bg-card); padding: 60px 50px; border-radius: 40px;
    box-shadow: var(--shadow); width: 100%; max-width: 460px;
    border: 1px solid var(--border); text-align: center; backdrop-filter: blur(10px);
  }

  h1 { font-family: 'Playfair Display', serif; font-size: 42px; color: var(--forest); margin-bottom: 10px; }
  body.dark-mode h1 { color: var(--gold); }

  .input-field {
    width: 100%; padding: 18px; border-radius: 16px; border: 1px solid var(--border);
    background: white; color: #2D3436; margin-bottom: 20px; font-size: 16px;
  }
  body.dark-mode .input-field { background: rgba(255,255,255,0.05); color: white; }

  .btn {
    width: 100%; padding: 20px; border-radius: 16px; border: none;
    font-weight: 700; cursor: pointer; background: var(--forest); color: white;
    font-size: 16px; text-transform: uppercase; letter-spacing: 1.5px;
  }
  body.dark-mode .btn { background: var(--gold); color: var(--forest); }

  /* Main Content - Dashboard */
  #main-content { display: none; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
  .card {
    background: var(--bg-card); padding: 50px 40px; border-radius: 40px;
    border: 1px solid var(--border); text-align: center; cursor: pointer;
    box-shadow: var(--shadow);
  }
  .card:hover { border-color: var(--gold); transform: translateY(-10px); }
  .card span { font-size: 55px; display: block; margin-bottom: 25px; }

  .theme-btn { position: fixed; top: 20px; right: 20px; cursor: pointer; z-index: 1000; background: var(--bg-card); border: 1px solid var(--border); padding: 10px 15px; border-radius: 12px; }
</style>
</head>
<body class="dark-mode">

<button class="theme-btn" onclick="document.body.classList.toggle('dark-mode')">🌓 Teema</button>

<div id="login-screen">
  <div class="login-card">
    <h1>Koduninja</h1>
    <p style="color: var(--text-light); margin-bottom: 40px;">Eksklusiivne teenuste portaal</p>
    <input id="email" class="input-field" type="email" value="demo@klient.ee">
    <input id="password" class="input-field" type="password" value="demo123">
    <button class="btn" onclick="handleLogin()">Logi sisse →</button>
  </div>
</div>

<div id="main-content">
  <div class="header">
    <h2 style="font-family: 'Playfair Display', serif; font-size: 38px;">Tere tulemast!</h2>
    <button class="btn" style="width:auto; padding:10px 25px;" onclick="location.reload()">Logi välja</button>
  </div>

  <div class="grid">
    <div class="card">
      <span>🧹</span>
      <h3 style="font-family: 'Playfair Display', serif; font-size: 26px;">Koristus</h3>
      <p style="color: var(--text-light); margin-top: 15px;">Luksuslik puhtus Sinu kodus.</p>
    </div>
    <div class="card">
      <span>🛠️</span>
      <h3 style="font-family: 'Playfair Display', serif; font-size: 26px;">Remont</h3>
      <p style="color: var(--text-light); margin-top: 15px;">Meistrid, keda saad usaldada.</p>
    </div>
    <div class="card">
      <span>🌿</span>
      <h3 style="font-family: 'Playfair Display', serif; font-size: 26px;">Aiatööd</h3>
      <p style="color: var(--text-light); margin-top: 15px;">Sinu roheline oaas vaevata.</p>
    </div>
  </div>
</div>

<script>
  function handleLogin() {
    // See on see käsk, mis teeb lehe "elavaks"
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
  }
</script>

</body>
</html>
