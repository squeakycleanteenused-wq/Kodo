<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koduninja — Euroopa teenuste platvorm</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-main: #FDFCF9;
    --bg-card: rgba(255, 255, 255, 0.94);
    --forest: #1A3326;
    --sage: #5C8A6E;
    --gold: #C9A84C;
    --text: #2D3436; 
    --text-light: #636E72;
    --border: #EFEBE3;
    --shadow: 0 10px 30px rgba(26,51,38,0.05);
  }

  body.dark-mode {
    --bg-main: #0F1713;
    --bg-card: rgba(24, 38, 32, 0.95);
    --text: #EFEBE3;
    --text-light: #A0AEC0;
    --border: #1F2F27;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: all 0.3s ease; }

  body { background-color: var(--bg-main); color: var(--text); min-height: 100vh; }

  /* --- LOGIN SCREEN --- */
  #login-screen { 
    display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; 
  }
  
  .login-card {
    background: var(--bg-card); padding: 50px; border-radius: 30px;
    box-shadow: var(--shadow); width: 100%; max-width: 420px;
    border: 1px solid var(--border); text-align: center;
  }

  h1 { font-family: 'Playfair Display', serif; font-size: 38px; margin-bottom: 10px; color: var(--forest); }
  body.dark-mode h1 { color: var(--gold); }

  .input-group { text-align: left; margin-bottom: 20px; }
  .input-label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: var(--text-light); }
  .input-field {
    width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--border);
    background: var(--bg-main); color: var(--text); font-size: 16px; outline: none;
  }

  .btn {
    width: 100%; padding: 16px; border-radius: 14px; border: none;
    font-weight: 700; cursor: pointer; background: var(--forest); color: white;
    font-size: 16px; margin-top: 10px;
  }
  .btn:hover { background: var(--gold); transform: translateY(-2px); }

  /* --- MAIN DASHBOARD --- */
  #main-content { display: none; padding: 40px 20px; max-width: 1100px; margin: 0 auto; }
  
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
  .card {
    background: var(--bg-card); padding: 25px; border-radius: 20px;
    border: 1px solid var(--border); cursor: pointer; text-align: center;
    box-shadow: var(--shadow);
  }
  .card:hover { border-color: var(--gold); transform: translateY(-5px); }
  .card span { font-size: 45px; display: block; margin-bottom: 15px; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>Koduninja</h1>
    <p style="margin-bottom: 30px; color: var(--text-light);">Logi sisse demo-vaatesse</p>
    
    <div class="input-group">
      <label class="input-label">E-mail</label>
      <input id="email" class="input-field" type="email" value="klient@demo.ee">
    </div>
    
    <div class="input-group">
      <label class="input-label">Parool</label>
      <input id="password" class="input-field" type="password" value="demo123">
    </div>
    
    <button class="btn" onclick="handleLogin()">Logi sisse →</button>
    
    <p id="error-msg" style="color: #e74c3c; margin-top: 15px; font-size: 14px; display: none;">Vale parool!</p>
  </div>
</div>

<div id="main-content">
  <div class="header">
    <h2 id="user-name" style="font-family: 'Playfair Display', serif;">Tere tulemast!</h2>
    <button class="btn" style="width: auto; padding: 10px 20px; margin: 0;" onclick="location.reload()">Logi välja</button>
  </div>

  <div id="client-area" class="hidden">
    <h3 style="margin-bottom: 25px;">Kuidas saame täna aidata?</h3>
    <div class="grid">
      <div class="card"><span>🧹</span><h4>Koristus</h4><p>Puhas kodu vaevata</p></div>
      <div class="card"><span>🛠️</span><h4>Remont</h4><p>Kvalifitseeritud meistrid</p></div>
      <div class="card"><span>🌱</span><h4>Aed</h4><p>Hoolitsetud väliruum</p></div>
    </div>
  </div>

  <div id="pro-area" class="hidden">
    <div style="background: var(--forest); color: white; padding: 30px; border-radius: 20px; margin-bottom: 30px;">
        <h3>Sinu aktiivsed pakkumised</h3>
        <p style="font-size: 32px; margin-top: 10px;">3 uut tellimust ootel</p>
    </div>
  </div>
</div>

<script>
  // Demo andmebaas
  const users = {
    'klient@demo.ee': { name: 'Mari Maasikas', role: 'klient', pass: 'demo123' },
    'tegija@demo.ee': { name: 'Kalle Kaevaja', role: 'tegija', pass: 'demo123' }
  };

  function handleLogin() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const error = document.getElementById('error-msg');

    if (users[email] && users[email].pass === pass) {
      // 1. Peida login
      document.getElementById('login-screen').style.display = 'none';
      // 2. Näita dashboardi
      document.getElementById('main-content').style.display = 'block';
      // 3. Määra nimi
      document.getElementById('user-name').innerText = `Tere, ${users[email].name}!`;
      
      // 4. Näita õiget vaadet
      if (users[email].role === 'klient') {
        document.getElementById('client-area').classList.remove('hidden');
      } else {
        document.getElementById('pro-area').classList.remove('hidden');
      }
    } else {
      error.style.display = 'block';
    }
  }
</script>

</body>
</html>
