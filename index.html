<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Koduninja — Eesti teenuste platvorm. Telli koristus, ehitus, IT, transport ja palju muud. Tegijatele: hakka teenima.">
<meta name="keywords" content="koristus, teenused, Eesti, Tallinn, Tartu, tegija, freelancer, platvorm">
<meta name="author" content="Koduninja">
<meta property="og:title" content="Koduninja — Eesti teenuste platvorm">
<meta property="og:description" content="Telli teenuseid või hakka ise teenusepakkujaks. 8% komisjon ainult edukalt tehingult.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://koduninja.ee">
<meta property="og:locale" content="et_EE">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Koduninja — Eesti teenuste platvorm">
<meta name="twitter:description" content="Telli teenuseid või hakka ise teenusepakkujaks.">
<meta name="theme-color" content="#1A3326">
<link rel="manifest" href="/manifest.json">
<title>Koduninja — Euroopa teenuste platvorm</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1A3326;
    --forest-mid: #2A5240;
    --sage: #5C8A6E;
    --mint: #A8D5BA;
    --cream: #F5F0E8;
    --warm-white: #FDFBF7;
    --gold: #C9A84C;
    --gold-light: #F0D898;
    --text: #1A1A18;
    --text-mid: #4A4A44;
    --text-light: #8A8A80;
    --border: #DDD8CC;
    --red: #C0392B;
    --blue: #2471A3;
    --shadow: 0 4px 24px rgba(26,51,38,0.12);
    --shadow-lg: 0 8px 48px rgba(26,51,38,0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  h1,h2,h3,.serif { font-family: 'Playfair Display', serif; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--sage); border-radius: 3px; }

  /* ── HEADER ── */
  .header {
    background: var(--forest);
    padding: 0 40px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.25);
  }
  .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .logo-icon { width: 36px; height: 36px; background: var(--gold); border-radius: 10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--cream); font-weight: 700; letter-spacing: 0.5px; }
  .logo-sub { font-size: 10px; color: var(--mint); letter-spacing: 3px; text-transform: uppercase; margin-top: -2px; }
  .nav { display: flex; align-items: center; gap: 6px; }
  .nav-btn { background: none; border: none; color: var(--mint); font-family: 'DM Sans'; font-size: 13px; padding: 8px 14px; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .nav-btn:hover { background: rgba(168,213,186,0.15); color: var(--cream); }
  .nav-btn.active { background: rgba(168,213,186,0.2); color: var(--gold-light); }
  .role-badge { background: var(--gold); color: var(--forest); border-radius: 20px; padding: 4px 14px; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }

  /* ── PAGES ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── LOGIN ── */
  .login-wrap {
    min-height: calc(100vh - 64px);
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 50%, var(--sage) 100%);
    padding: 40px 20px;
  }
  .login-box {
    background: var(--warm-white);
    border-radius: 24px;
    padding: 48px 40px;
    max-width: 460px; width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .login-title { font-size: 32px; color: var(--forest); margin-bottom: 8px; }
  .login-sub { color: var(--text-mid); font-size: 15px; margin-bottom: 36px; line-height: 1.5; }
  .input-group { margin-bottom: 16px; }
  .input-label { font-size: 11px; font-weight: 700; color: var(--sage); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .input-field {
    width: 100%; padding: 12px 16px; border: 2px solid var(--border);
    border-radius: 12px; font-family: 'DM Sans'; font-size: 14px;
    background: var(--warm-white); outline: none; transition: border 0.2s;
    color: var(--text);
  }
  .input-field:focus { border-color: var(--sage); }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: 12px; font-family: 'DM Sans'; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none; letter-spacing: 0.3px; }
  .btn-primary { background: var(--forest); color: var(--cream); }
  .btn-primary:hover { background: var(--forest-mid); transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-gold { background: var(--gold); color: var(--forest); }
  .btn-gold:hover { background: #D4A84E; transform: translateY(-1px); }
  .btn-outline { background: transparent; border: 2px solid var(--forest); color: var(--forest); }
  .btn-outline:hover { background: var(--forest); color: var(--cream); }
  .btn-full { width: 100%; }

  /* ── MAIN LAYOUT ── */
  .main-layout { display: flex; min-height: calc(100vh - 64px); }
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--warm-white);
    border-right: 1px solid var(--border);
    padding: 24px 14px;
    position: sticky; top: 64px; height: calc(100vh - 64px);
    overflow-y: auto;
  }
  .sidebar-section { margin-bottom: 24px; }
  .sidebar-section-title { font-size: 10px; font-weight: 700; color: var(--text-light); letter-spacing: 2px; text-transform: uppercase; padding: 0 10px; margin-bottom: 6px; }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-mid);
    transition: all 0.15s; margin-bottom: 2px;
  }
  .sidebar-item:hover { background: var(--cream); color: var(--forest); }
  .sidebar-item.active { background: #E8F0EB; color: var(--forest); font-weight: 600; }
  .sidebar-item .icon { font-size: 16px; width: 22px; text-align: center; }

  .content { flex: 1; padding: 32px 40px; max-width: 1100px; }
  .content-title { font-size: 28px; color: var(--forest); margin-bottom: 4px; }
  .content-sub { color: var(--text-light); font-size: 14px; margin-bottom: 28px; }

  /* ── CARDS ── */
  .card { background: var(--warm-white); border-radius: 16px; border: 1px solid var(--border); padding: 24px; margin-bottom: 16px; }
  .card-title { font-size: 16px; font-weight: 700; color: var(--forest); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--warm-white); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .stat-val { font-family: 'Playfair Display'; font-size: 28px; color: var(--forest); font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text-light); margin-top: 4px; }

  /* ── INVOICE ASSISTANT ── */
  .ai-panel {
    background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%);
    border-radius: 16px; padding: 20px; color: var(--cream);
    margin-bottom: 20px;
  }
  .ai-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .ai-icon { width: 36px; height: 36px; background: var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .ai-messages { max-height: 200px; overflow-y: auto; margin-bottom: 12px; padding: 10px; background: rgba(0,0,0,0.1); border-radius: 8px; }
  .ai-msg { padding: 8px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 8px; }
  .ai-msg.assistant { background: rgba(255,255,255,0.15); align-self: flex-start; }
  .ai-msg.user { background: rgba(201,168,76,0.3); align-self: flex-end; text-align: right; }

  /* ============================================================
     KODUNINJA LOGIN — TUME REŽIIM, PUHAS VAADE + ISIKLIK LOGO
     ============================================================ */
  #page-login .login-wrap {
    background:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='800' viewBox='0 0 800 800'><g fill='none' stroke='%23ffffff' stroke-opacity='0.04' stroke-width='1'><circle cx='400' cy='400' r='60'/><circle cx='400' cy='400' r='120'/><circle cx='400' cy='400' r='180'/><circle cx='400' cy='400' r='240'/><circle cx='400' cy='400' r='300'/><circle cx='400' cy='400' r='360'/><circle cx='400' cy='400' r='420'/></g></svg>") center/700px 700px no-repeat,
      #0f1f1a;
  }
  #page-login .login-box {
    background: rgba(20, 40, 33, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    padding: 56px 56px 48px;
    max-width: 440px;
  }
  #auth-login::before {
    content: "";
    display: block;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background-color: rgba(255, 255, 255, 0.06);
    background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAOQAAAEACAYAAACj9dqt..."); /* Sinu logo base64 */
    background-size: 60%;
    background-position: center;
    background-repeat: no-repeat;
    margin: 0 auto 24px;
  }
  #page-login .login-title { color: #ffffff !important; text-align: center; }
  #page-login .login-sub { color: #8a9a92 !important; text-align: center; }
  #page-login .input-field { background: rgba(15, 31, 26, 0.7) !important; color: white !important; }
  #page-login #login-submit-btn { background: #d4af50 !important; color: #1a2922 !important; font-weight: 700; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">🥷</div>
    <div>
      <div class="logo-text">Koduninja</div>
      <div class="logo-sub">Teenuste platvorm</div>
    </div>
  </div>
  <div class="nav" id="header-nav" style="display:none;">
    <span class="role-badge" id="role-badge">Klient</span>
    <button class="nav-btn" onclick="logout()">Logi välja</button>
  </div>
</header>

<div id="page-login" class="page active">
  <div class="login-wrap">
    <div class="login-box">
      <div id="auth-login">
        <h1 class="login-title serif">Tere tulemast</h1>
        <p class="login-sub">Sisene oma Koduninja kontole.</p>
        <div class="input-group">
          <label class="input-label">E-mail</label>
          <input class="input-field" id="login-email" type="email" placeholder="teie@email.ee">
        </div>
        <div class="input-group">
          <label class="input-label">Parool</label>
          <input class="input-field" id="login-pw" type="password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary btn-full" id="login-submit-btn" onclick="doLogin()">Logi sisse →</button>
      </div>
    </div>
  </div>
</div>

<div id="page-klient" class="page">
  <div class="main-layout">
    <nav class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Klient</div>
        <div class="sidebar-item active" onclick="showSection('k-dashboard')"><span class="icon">📊</span>Ülevaade</div>
        <div class="sidebar-item" onclick="showSection('k-cleaners')"><span class="icon">🧹</span>Tegijad</div>
        <div class="sidebar-item" onclick="showSection('k-bookings')"><span class="icon">📅</span>Broneeringud</div>
      </div>
    </nav>
    <main class="content">
      <section id="k-dashboard">
        <h2 class="content-title serif">Tere tulemast tagasi! 👋</h2>
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-val">3</div><div class="stat-label">Broneeringut</div></div>
          <div class="stat-card"><div class="stat-val">126€</div><div class="stat-label">Kulutused</div></div>
        </div>
        <div class="ai-panel">
          <div class="ai-header"><div class="ai-icon">🤖</div><div style="font-weight:700">Koduninja Assistent</div></div>
          <div class="ai-messages" id="ai-msgs">
            <div class="ai-msg assistant">Tere! Kuidas saan täna kasulik olla?</div>
          </div>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
function doLogin() {
  const email = document.getElementById('login-email').value;
  if(email) {
    document.getElementById('page-login').classList.remove('active');
    document.getElementById('page-klient').classList.add('active');
    document.getElementById('header-nav').style.display = 'flex';
  }
}

function logout() {
  location.reload();
}

function showSection(id) {
  // Demo lihtsustatud vahetus
  alert('Sektsiooni vahetus: ' + id);
}
</script>
</body>
</html>
