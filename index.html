<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koduninja — Euroopa teenuste platvorm</title>
    <style>
        /* 1. FONDID */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap');

        :root {
            --bg-main: #FDFCF9;
            --bg-card: rgba(255, 255, 255, 0.94);
            --forest: #1A3326;
            --sage: #5C8A6E;
            --gold: #C9A84C;
            --text: #2D3436; 
            --text-light: #636E72;
            --border: #EFEBE3;
            --pattern-color: #1A3326; 
            --shadow: 0 10px 30px rgba(26,51,38,0.05);
        }

        body.dark-mode {
            --bg-main: #0F1713;
            --bg-card: rgba(24, 38, 32, 0.95);
            --forest: #EFEBE3;
            --sage: #A0AEC0;
            --gold: #C9A84C;
            --text: #EFEBE3;
            --text-light: #A0AEC0;
            --border: #1F2F27;
            --pattern-color: #C9A84C;
            --shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* 2. ÜLDINE STIIL */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at 2px 2px, var(--pattern-color) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* 3. LOGIN KAART */
        .login-card {
            background: var(--bg-card);
            padding: 60px 50px;
            border-radius: 40px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 460px;
            border: 1px solid var(--border);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            color: var(--forest);
            margin-bottom: 20px;
        }

        body.dark-mode h1 { color: var(--gold); }

        .input-group { text-align: left; margin-bottom: 25px; }

        .input-label {
            display: block; margin-bottom: 8px;
            font-weight: 600; font-size: 14px;
            color: var(--sage); text-transform: uppercase;
        }

        .input-field {
            width: 100%; padding: 18px; border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text); font-size: 16px;
        }

        .btn {
            width: 100%; padding: 20px; border-radius: 16px;
            border: none; font-weight: 700; font-size: 16px;
            cursor: pointer; text-transform: uppercase;
            background: var(--forest); color: #fff;
        }

        body.dark-mode .btn { background: var(--gold); color: var(--forest); }

        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            cursor: pointer; padding: 10px; border-radius: 50%;
            background: var(--bg-card); border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>

    <div class="login-card" id="login-view">
        <h1>Koduninja</h1>
        <div class="input-group">
            <span class="input-label">Kasutaja</span>
            <input type="text" class="input-field" placeholder="ninja@kodu.ee">
        </div>
        <div class="input-group">
            <span class="input-label">Parool</span>
            <input type="password" class="input-field" placeholder="••••••••">
        </div>
        <button class="btn" onclick="handleLogin()">Sisene portaali</button>
    </div>

    <script>
        function handleLogin() {
            alert('Tere tulemast, Ninja!');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }
    </script>
</body>
</html>
