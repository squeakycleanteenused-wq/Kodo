<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koduninja — Euroopa teenuste platvorm</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-main: #FDFCF9;
            --bg-card: rgba(255, 255, 255, 0.98);
            --forest: #1A3326;
            --gold: #C9A84C;
            --text: #2D3436; 
            --text-light: #636E72;
            --border: #EFEBE3;
            --shadow: 0 10px 40px rgba(26,51,38,0.1);
        }

        body.dark-mode {
            --bg-main: #0F1713;
            --bg-card: rgba(24, 38, 32, 0.95);
            --text: #EFEBE3;
            --text-light: #A0AEC0;
            --border: #1F2F27;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text);
            min-height: 100vh;
            /* See peen muster taustal */
            background-image: radial-gradient(circle at 2px 2px, var(--border) 1px, transparent 0);
            background-size: 30px 30px;
            transition: background 0.3s ease;
        }

        /* LOGIN WRAPPER */
        #login-section {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 42px; color: var(--forest); margin-bottom: 10px; }
        body.dark-mode h1 { color: var(--gold); }

        .input-field {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: white;
            margin-bottom: 20px;
            font-size: 16px;
            outline: none;
        }
        body.dark-mode .input-field { background: rgba(255,255,255,0.05); color: white; }

        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            border: none;
            background: var(--forest);
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        body.dark-mode .btn-main { background: var(--gold); color: var(--forest); }

        /* DASHBOARD (ALGUSES PEIDETUD) */
        #dashboard-section {
            display: none;
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        
        .card {
            background: var(--bg-card);
            padding: 50px 30px;
            border-radius: 40px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: var(--shadow);
            transition: 0.3s;
        }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .card .icon { font-size: 60px; display: block; margin-bottom: 25px; }
        .card h3 { font-family: 'Playfair Display', serif; font-size: 28px; margin-bottom: 15px; }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; 
            background: var(--bg-card); border: 1px solid var(--border);
            padding: 10px 15px; border-radius: 12px; cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body class="dark-mode">

    <button class="theme-toggle" onclick="document.body.classList.toggle('dark-mode')">🌓 Režiim</button>

    <div id="login-section">
        <div class="login-card">
            <h1>Koduninja</h1>
            <p style="color: var(--text-light); margin-bottom: 40px;">Eksklusiivne teenuste platvorm</p>
            <input type="email" class="input-field" placeholder="E-mail" value="klient@demo.ee">
            <input type="password" class="input-field" placeholder="Parool" value="demo123">
            <button class="btn-main" onclick="logiSisse()">Logi sisse →</button>
        </div>
    </div>

    <div id="dashboard-section">
        <div class="header">
            <div>
                <h2 style="font-family: 'Playfair Display', serif; font-size: 40px;">Tere tulemast!</h2>
                <p style="color: var(--gold); font-weight: 700; letter-spacing: 2px;">SINU NINJA DASHBOARD</p>
            </div>
            <button class="btn-main" style="width: auto; padding: 10px 25px;" onclick="location.reload()">Logi välja</button>
        </div>

        <div class="grid">
            <div class="card">
                <span class="icon">🧹</span>
                <h3>Koristus</h3>
                <p style="color: var(--text-light);">Telli luksuslik puhtus oma koju.</p>
            </div>
            <div class="card">
                <span class="icon">🛠️</span>
                <h3>Remont</h3>
                <p style="color: var(--text-light);">Meistrid, kes tunnevad oma tööd.</p>
            </div>
            <div class="card">
                <span class="icon">🌿</span>
                <h3>Aiatööd</h3>
                <p style="color: var(--text-light);">Hooldatud aed ilma vaevata.</p>
            </div>
        </div>
    </div>

    <script>
        function logiSisse() {
            // See on maagia: peidame logini ja näitame sisu
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';
        }
    </script>

</body>
</html>
