<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Koduninja — Eesti teenuste platvorm. Telli koristus, ehitus, IT, transport ja palju muud.">
<title>Koduninja — Euroopa teenuste platvorm</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1A3326;
    --forest-mid: #2A5240;
    --sage: #5C8A6E;
    --mint: #A8D5BA;
    --cream: #F5F0E8;
    --warm-white: #FDFBF7;
    --gold: #C9A84C;
    --gold-light: #F0D898;
    --text: #1A1A18;
    --shadow-lg: 0 8px 48px rgba(26,51,38,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: #0f1f1a; color: #ffffff; min-height: 100vh; overflow-x: hidden; }

  /* --- PÄIS --- */
  .header {
    background: var(--forest);
    padding: 0 40px;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.25);
  }
  .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .logo-icon { width: 36px; height: 36px; background: var(--gold); border-radius: 10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--cream); font-weight: 700; }

  /* --- LOGIN VAADE --- */
  #page-login .login-wrap {
    min-height: calc(100vh - 64px);
    display: flex; align-items: center; justify-content: center;
    background: 
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='800' height='800' viewBox='0 0 800 800'><g fill='none' stroke='%23ffffff' stroke-opacity='0.04' stroke-width='1'><circle cx='400' cy='400' r='60'/><circle cx='400' cy='400' r='120'/><circle cx='400' cy='400' r='180'/><circle cx='400' cy='400' r='240'/><circle cx='400' cy='400' r='300'/><circle cx='400' cy='400' r='360'/><circle cx='400' cy='400' r='420'/></g></svg>") center/700px 700px no-repeat,
      #0f1f1a;
    padding: 20px;
  }
  .login-box {
    background: rgba(20, 40, 33, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    padding: 56px;
    max-width: 440px; width: 100%;
    text-align: center;
  }
  .logo-placeholder {
    width: 96px; height: 96px; border-radius: 50%;
    background: rgba(255, 255, 255, 0.06);
    margin: 0 auto 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
  }
  .login-title { font-family: 'Playfair Display', serif; font-size: 30px; color: #ffffff; margin-bottom: 8px; }
  .login-sub { color: #8a9a92; font-size: 15px; margin-bottom: 32px; }

  .input-group { text-align: left; margin-bottom: 20px; }
  .input-label { font-size: 11px; font-weight: 700; color: #8a9a92; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; display: block; }
  .input-field {
    width: 100%; padding: 14px 18px; background: rgba(15, 31, 26, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px;
    color: #ffffff; outline: none; font-size: 15px;
  }
  .input-field:focus { border-color: var(--gold); }
  .btn-primary {
    width: 100%; padding: 16px; border-radius: 10px; border: none;
    background: var(--gold); color: #1a2922; font-weight: 700; font-size: 15px;
    cursor: pointer; transition: 0.2s;
  }
  .btn-primary:hover { background: #e0bc5e; transform: translateY(-1px); }

  /* --- ÜLDINE --- */
  .page { display: none; }
  .page.active { display: block; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">🥷</div>
    <div class="logo-text">Koduninja</div>
  </div>
  <div class="nav" id="header-nav" style="display:none;">
    <button class="btn-primary" style="width:auto; padding:8px 16px;" onclick="location.reload()">Logi välja</button>
  </div>
</header>

<div id="page-login" class="page active">
  <div class="login-wrap">
    <div class="login-box">
      <div class="logo-placeholder">🥷</div>
      <h1 class="login-title">Tere tulemast</h1>
      <p class="login-sub">Sisene oma Koduninja kontole.</p>
      <div class="input-group">
        <label class="input-label">E-mail</label>
        <input class="input-field" id="login-email" type="email" placeholder="teie@email.ee">
      </div>
      <div class="input-group">
        <label class="input-label">Parool</label>
        <input class="input-field" id="login-pw" type="password" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="doLogin()">Logi sisse →</button>
    </div>
  </div>
</div>

<div id="page-klient" class="page" style="padding: 40px; text-align: center;">
  <h1 class="login-title">Tere tulemast tagasi! 👋</h1>
  <p class="login-sub">Sinu konto on nüüd ligipääsetav.</p>
</div>

<script>
function doLogin() {
  const email = document.getElementById('login-email').value;
  if(email) {
    document.getElementById('page-login').classList.remove('active');
    document.getElementById('page-klient').classList.add('active');
    document.getElementById('header-nav').style.display = 'block';
  } else {
    alert('Palun sisesta e-mail!');
  }
}
</script>
</body>
</html>
