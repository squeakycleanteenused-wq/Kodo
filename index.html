<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koduninja — Euroopa teenuste platvorm</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #0F1713;
    --bg-card: rgba(24, 38, 32, 0.98);
    --forest: #1A3326;
    --gold: #C9A84C;
    --text: #EFEBE3;
    --text-light: #A0AEC0;
    --border: rgba(201, 168, 76, 0.15);
    --shadow: 0 15px 45px rgba(0,0,0,0.4);
  }

  body {
    background-color: var(--bg-main);
    color: var(--text);
    margin: 0;
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    background-image: radial-gradient(circle at 2px 2px, #1A3326 1px, transparent 0);
    background-size: 40px 40px;
  }

  /* Login */
  #login-screen { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; }
  .login-card {
    background: var(--bg-card); padding: 50px; border-radius: 35px;
    box-shadow: var(--shadow); width: 100%; max-width: 420px;
    border: 1px solid var(--border); text-align: center; backdrop-filter: blur(15px);
  }

  /* Main Dashboard */
  #main-content { display: none; padding: 40px 20px; max-width: 1100px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
  
  /* Teenuste valik */
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
  .category-card {
    background: var(--bg-card); padding: 30px; border-radius: 25px;
    border: 1px solid var(--border); cursor: pointer; text-align: center;
    transition: 0.3s;
  }
  .category-card:hover { border-color: var(--gold); transform: translateY(-5px); background: #1a2a22; }
  .category-card span { font-size: 45px; display: block; margin-bottom: 15px; }

  /* SEE ON SEE OSA, MIS PILDIL OLI - PRO LIST */
  .pro-card {
    background: var(--bg-card); padding: 25px; border-radius: 20px;
    border: 1px solid var(--border); margin-bottom: 15px;
    display: flex; justify-content: space-between; align-items: center;
    transition: 0.3s;
  }
  .pro-card:hover { border-color: var(--gold); }
  
  .pro-info { display: flex; align-items: center; gap: 20px; }
  .pro-emoji { width: 60px; height: 60px; background: #1A3326; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; border: 1px solid var(--gold); }
  
  .badge { font-size: 11px; background: var(--gold); color: var(--forest); padding: 2px 8px; border-radius: 10px; font-weight: 700; margin-left: 10px; }

  .btn-ninja {
    width: 100%; padding: 18px; border-radius: 14px; border: none;
    background: var(--gold); color: var(--forest); font-weight: 800;
    cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 15px;
  }

  .hidden { display: none !important; }
  h1, h2, h3 { font-family: 'Playfair Display', serif; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1 style="color: var(--gold); font-size: 40px;">Koduninja</h1>
    <p style="color: var(--text-light); margin-bottom: 35px;">Eksklusiivne teenuste portaal</p>
    <input id="email" style="width:100%; padding:16px; margin-bottom:15px; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,0.03); color:white;" type="email" value="klient@demo.ee">
    <input id="password" style="width:100%; padding:16px; margin-bottom:25px; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,0.03); color:white;" type="password" value="demo123">
    <button class="btn-ninja" onclick="handleLogin()">Sisene</button>
  </div>
</div>

<div id="main-content">
  <div class="header">
    <div>
      <h2 id="welcome" style="font-size: 36px; color: var(--gold);">Tere tulemast!</h2>
      <p style="color: var(--text-light); text-transform: uppercase; font-size: 12px; letter-spacing: 2px;">Ninja Klient</p>
    </div>
    <button onclick="location.reload()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:8px 20px; border-radius:10px; cursor:pointer;">Logi välja</button>
  </div>

  <div id="cat-view">
    <h3 style="margin-bottom: 30px;">Vali vajalik teenus:</h3>
    <div class="grid">
      <div class="category-card" onclick="showCategory('koristus')"><span>🧹</span><h4>Koristus</h4></div>
      <div class="category-card" onclick="showCategory('ehitus')"><span>🛠️</span><h4>Remont</h4></div>
      <div class="category-card" onclick="showCategory('transport')"><span>🚚</span><h4>Transport</h4></div>
    </div>
  </div>

  <div id="pro-view" class="hidden">
    <button onclick="backToCats()" style="background:none; border:none; color:var(--gold); cursor:pointer; margin-bottom:20px
