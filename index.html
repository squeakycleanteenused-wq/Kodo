<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koduninja — Euroopa teenuste platvorm</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #FDFCF9; --bg-card: rgba(255, 255, 255, 0.94);
    --forest: #1A3326; --sage: #5C8A6E; --gold: #C9A84C;
    --text: #2D3436; --text-light: #636E72; --border: #EFEBE3;
    --shadow: 0 10px 30px rgba(26,51,38,0.05);
  }
  body.dark-mode {
    --bg-main: #0F1713; --bg-card: rgba(24, 38, 32, 0.95);
    --text: #EFEBE3; --text-light: #A0AEC0; --border: #1F2F27;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: all 0.3s ease; }
  body { background-color: var(--bg-main); color: var(--text); min-height: 100vh; }

  /* Login */
  #login-screen { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; }
  .login-card { background: var(--bg-card); padding: 50px; border-radius: 30px; box-shadow: var(--shadow); width: 100%; max-width: 420px; border: 1px solid var(--border); text-align: center; }
  
  /* Sisu */
  #main-content { display: none; padding: 40px 20px; max-width: 1100px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
  .card { background: var(--bg-card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; text-align: center; }
  .card:hover { border-color: var(--gold); transform: translateY(-5px); }
  
  .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; background: var(--forest); color: white; font-size: 16px; margin-top: 10px; }
  .btn:hover { background: var(--gold); }
  .input-field { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--border); margin-bottom: 20px; background: var(--bg-main); color: var(--text); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1 style="font-family: 'Playfair Display', serif; font-size: 38px; color: var(--forest);">Koduninja</h1>
    <p style="margin-bottom: 30px; color: var(--text-light);">Logi sisse demo-vaatesse</p>
    <input id="email" class="input-field" type="email" value="klient@demo.ee">
    <input id="password" class="input-field" type="password" value="demo123">
    <button class="btn" onclick="handleLogin()">Logi sisse →</button>
  </div>
</div>

<div id="main-content">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
    <h2 id="user-name" style="font-family: 'Playfair Display', serif; font-size: 32px;">Tere tulemast!</h2>
    <button onclick="location.reload()" style="background:none; border:1px solid var(--border); padding:10px 20px; border-radius:10px; cursor:pointer; color:var(--text);">Logi välja</button>
  </div>

  <div id="client-area" class="hidden">
    <h3>Vali teenus:</h3>
    <div class="grid">
      <div class="card"><span>🧹</span><h4>Koristus</h4></div>
      <div class="card"><span>🛠️</span><h4>Remont</h4></div>
      <div class="card"><span>🌱</span><h4>Aed</h4></div>
    </div>
  </div>

  <div id="pro-area" class="hidden">
      <div style="background: var(--forest); color: white; padding: 40px; border-radius: 20px;">
          <h3>Ninja paneel</h3>
          <p>Sul on 3 uut tööpakkumist!</p>
      </div>
  </div>
</div>

<script>
  const users = {
    'klient@demo.ee': { name: 'Mari Maasikas', role: 'klient', pass: 'demo123' },
    'tegija@demo.ee': { name: 'Kalle Koduabi', role: 'tegija', pass: 'demo123' }
  };

  function handleLogin() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;

    if (users[email] && users[email].pass === pass) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      document.getElementById('user-name').innerText = "Tere, " + users[email].name + "!";
      
      if (users[email].role === 'klient') {
        document.getElementById('client-area').classList.remove('hidden');
      } else {
        document.getElementById('pro-area').classList.remove('hidden');
      }
    } else {
      alert("Vale parool või e-mail!");
    }
  }
</script>
</body>
</html>
