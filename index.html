<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koduninja — Euroopa teenuste platvorm</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-main: #0F1713;
    --bg-card: rgba(24, 38, 32, 0.98);
    --forest: #1A3326;
    --gold: #C9A84C;
    --text: #EFEBE3;
    --text-light: #A0AEC0;
    --border: rgba(201, 168, 76, 0.2);
    --shadow: 0 15px 45px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

  body {
    background-color: var(--bg-main);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(circle at 2px 2px, #1A3326 1px, transparent 0);
    background-size: 40px 40px;
  }

  /* --- LOGIN SCREEN --- */
  #login-screen { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; }
  .login-card {
    background: var(--bg-card); padding: 50px; border-radius: 35px;
    box-shadow: var(--shadow); width: 100%; max-width: 420px;
    border: 1px solid var(--border); text-align: center; backdrop-filter: blur(15px);
  }

  /* --- MAIN CONTENT --- */
  #main-content { display: none; padding: 40px 20px; max-width: 1100px; margin: 0 auto; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
  
  /* --- KATEGOORIAD --- */
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
  .category-card {
    background: var(--bg-card); padding: 35px 20px; border-radius: 25px;
    border: 1px solid var(--border); cursor: pointer; text-align: center;
    transition: 0.3s;
  }
  .category-card:hover { border-color: var(--gold); transform: translateY(-5px); background: #1a2a22; }
  .category-card span { font-size: 50px; display: block; margin-bottom: 15px; }

  /* --- PRO LIST (Sinu soovitud detailne vaade) --- */
  .pro-card {
    background: var(--bg-card); padding: 25px; border-radius: 20px;
    border: 1px solid var(--border); margin-bottom: 15px;
    display: flex; justify-content: space-between; align-items: center;
    transition: 0.3s; flex-wrap: wrap; gap: 15px;
  }
  .pro-card:hover { border-color: var(--gold); background: rgba(31, 47, 39, 1); }
  
  .pro-info { display: flex; align-items: center; gap: 20px; }
  .pro-emoji { width: 65px; height: 65px; background: #1A3326; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; border: 1px solid var(--gold); }
  
  .badge { font-size: 10px; background: var(--gold); color: var(--forest); padding: 3px 10px; border-radius: 12px; font-weight: 800; margin-left: 10px; text-transform: uppercase; }

  .btn-ninja {
    width: 100%; padding: 18px; border-radius: 14px; border: none;
    background: var(--gold); color: var(--forest); font-weight: 800;
    cursor: pointer; text-transform: uppercase; font-size: 15px;
  }

  .hidden { display: none !important; }
  h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div style="font-size: 45px; margin-bottom: 10px;">🥷</div>
    <h1 style="color: var(--gold); font-size: 42px; margin-bottom: 10px;">Koduninja</h1>
    <p style="color: var(--text-light); margin-bottom: 35px;">Sisene portaali</p>
    <input id="email" style="width:100%; padding:16px; margin-bottom:15px; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,0.03); color:white; font-size:16px;" type="email" value="klient@demo.ee">
    <input id="password" style="width:100%; padding:16px; margin-bottom:25px; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,0.03); color:white; font-size:16px;" type="password" value="demo123">
    <button class="btn-ninja" onclick="handleLogin()">Logi sisse</button>
  </div>
</div>

<div id="main-content">
  <div class="header">
    <div>
      <h2 id="welcome" style="font-size: 36px; color: var(--gold);">Tere tulemast!</h2>
      <p style="color: var(--text-light); text-transform: uppercase; font-size: 12px; letter-spacing: 2px; font-weight: 700;">Ninja Eraisik</p>
    </div>
    <button onclick="location.reload()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:8px 18px; border-radius:10px; cursor:pointer; font-weight: 700;">LOGI VÄLJA</button>
  </div>

  <div id="cat-view">
    <h3 style="margin-bottom: 30px; font-size: 28px;">Millist abi te täna vajate?</h3>
    <div class="grid">
      <div class="category-card" onclick="showPros('koristus')"><span>🧹</span><h4>Koristus</h4></div>
      <div class="category-card" onclick="showPros('ehitus')"><span>🛠️</span><h4>Remont</h4></div>
      <div class="category-card" onclick="showPros('transport')"><span>🚚</span><h4>Transport</h4></div>
    </div>
  </div>

  <div id="pro-view" class="hidden">
    <button onclick="backToCats()" style="background:none; border:none; color:var(--gold); cursor:pointer; margin-bottom:25px; font-weight:700; font-size: 15px;">← TAGASI VALIKUSSE</button>
    <h3 id="cat-title" style="margin-bottom:30px; font-size: 32px; color: var(--gold);">Saadaolevad Ninjad</h3>
    <div id="pro-container"></div>
  </div>
</div>

<script>
  // KOGU INFO VANAST KOODIST (Sinu pildil olev sisu)
  const users = { 'klient@demo.ee': { name: 'Mari Maasikas', pass: 'demo123' } };
  
  const data = {
    'koristus': [
      { nimi: 'Puhastusproff OÜ', hind: 25, hinnang: 4.9, asukoht: 'Tallinn', kiir: '1h', emoji: '✨' },
      { nimi: 'KoduSära Mari', hind: 22, hinnang: 4.7, asukoht: 'Tartu', kiir: '2h', emoji: '🧹' },
      { nimi: 'EcoClean Grupp', hind: 28, hinnang: 4.8, asukoht: 'Pärnu', kiir: '30min', emoji: '🌿' }
    ],
    'ehitus': [
      { nimi: 'Meistrimees Ants', hind: 35, hinnang: 5.0, asukoht: 'Harjumaa', kiir: 'Plaanitav', emoji: '🔨' },
      { nimi: 'Torutööd 24/7', hind: 45, hinnang: 4.8, asukoht: 'Tallinn', kiir: 'Kiire', emoji: '🔧' }
    ],
    'transport': [
      { nimi: 'Kiire Kaubik', hind: 30, hinnang: 4.6, asukoht: 'Eesti', kiir: '15min', emoji: '🚚' }
    ]
  };

  function handleLogin() {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    if (users[e] && users[e].pass === p) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      document.getElementById('welcome').innerText = "Tere, " + users[e].name + "!";
    } else { alert("Andmed: klient@demo.ee / demo123"); }
  }

  function showPros(cat) {
    document.getElementById('cat-view').classList.add('hidden');
    document.getElementById('pro-view').classList.remove('hidden');
    document.getElementById('cat-title').innerText = cat === 'koristus' ? 'Puhastusteenused' : (cat === 'ehitus' ? 'Remonditööd' : 'Kaubavedu');
    
    const container = document.getElementById('pro-container');
    container.innerHTML = '';
    
    data[cat].forEach(pro => {
      const finalPrice = (pro.hind * 1.08).toFixed(2);
      container.innerHTML += `
        <div class="pro-card">
          <div class="pro-info">
            <div class="pro-emoji">${pro.emoji}</div>
            <div>
              <div style="font-weight:700; font-size:19px;">${pro.nimi} <span class="badge">Ninja Pro</span></div>
              <div style="font-size:13px; color:var(--text-light); margin-top:5px;">
                📍 ${pro.asukoht} · ⭐ ${pro.hinnang} · ⏱️ ${pro.kiir}
              </div>
            </div>
          </div>
          <div style="text-align:right;">
            <div style="color:var(--gold); font-weight:800; font-size:26px;">${finalPrice}€/h</div>
            <div style="font-size:10px; opacity:0.6; margin-bottom:8px;">sisaldab teenustasu</div>
            <button style="background:var(--gold); color:var(--forest); border:none; padding:10px 20px; border-radius:10px; font-weight:800; cursor:pointer;">VALI NINJA</button>
          </div>
        </div>`;
    });
  }

  function backToCats() {
    document.getElementById('pro-view').classList.add('hidden');
    document.getElementById('cat-view').classList.remove('hidden');
  }
</script>
</body>
</html>
