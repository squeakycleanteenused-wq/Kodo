<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koduninja — Euroopa teenuste platvorm</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>
  :root {
    /* Hele režiim - Zen vaib */
    --bg-main: #FDFCF9;
    --bg-card: rgba(255, 255, 255, 0.94);
    --forest: #1A3326;
    --sage: #5C8A6E;
    --gold: #C9A84C;
    --text: #2D3436; 
    --text-light: #636E72;
    --border: #EFEBE3;
    --pattern-color: #1A3326; 
    --pattern-opacity: 0.15; 
    --shadow: 0 10px 30px rgba(26,51,38,0.05);
  }

  /* Tume režiim - Ninja vaib */
  body.dark-mode {
    --bg-main: #0F1713;
    --bg-card: rgba(26, 43, 35, 0.94);
    --forest: #A8D5BA;
    --sage: #8BB299;
    --gold: #D4B86A;
    --text: #F1F2F6;
    --text-light: #A4B0BE;
    --border: #22332B;
    --pattern-color: #A8D5BA;
    --pattern-opacity: 0.2;
    --shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; transition: background-color 0.3s, color 0.3s, border-color 0.3s; }
  
  body { 
    font-family: 'Outfit', sans-serif; 
    background-color: var(--bg-main); 
    /* Dünaamiline Karesansui muster */
    background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%231A3326' stroke-width='1.5' stroke-opacity='0.15' style='filter:blur(0.5px)'%3E%3Ccircle cx='200' cy='200' r='30'/%3E%3Ccircle cx='200' cy='200' r='60'/%3E%3Ccircle cx='200' cy='200' r='90'/%3E%3Ccircle cx='200' cy='200' r='120'/%3E%3Ccircle cx='200' cy='200' r='150'/%3E%3Ccircle cx='200' cy='200' r='180'/%3E%3Ccircle cx='200' cy='200' r='210'/%3E%3C/g%3E%3C/svg%3E");
    background-attachment: fixed;
    color: var(--text); 
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Tumedas režiimis muudame mustri värvi heledaks läbi CSS-i filtri, et vältida mitut SVG-d */
  body.dark-mode {
    background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23A8D5BA' stroke-width='1.5' stroke-opacity='0.2' style='filter:blur(0.5px)'%3E%3Ccircle cx='200' cy='200' r='30'/%3E%3Ccircle cx='200' cy='200' r='60'/%3E%3Ccircle cx='200' cy='200' r='90'/%3E%3Ccircle cx='200' cy='200' r='120'/%3E%3Ccircle cx='200' cy='200' r='150'/%3E%3Ccircle cx='200' cy='200' r='180'/%3E%3Ccircle cx='200' cy='200' r='210'/%3E%3C/g%3E%3C/svg%3E");
  }

  /* ── HEADER ── */
  .header {
    background: #1A3326;
    padding: 0 40px;
    height: 70px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }

  .logo { display: flex; align-items: center; gap: 15px; text-decoration: none; }
  .logo-text { font-size: 22px; color: #FDFCF9; font-weight: 700; letter-spacing: -0.5px; }
  .logo-sub { font-size: 9px; color: #A8D5BA; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; }

  .theme-toggle {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 8px 16px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Outfit';
    font-size: 13px;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.2s;
  }
  .theme-toggle:hover { background: rgba(255,255,255,0.2); }

  /* ── LOGIN BOX ── */
  .login-wrap {
    min-height: calc(100vh - 70px);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }

  .login-box {
    background: var(--bg-card);
    backdrop-filter: blur(15px);
    border-radius: 40px;
    padding: 60px;
    max-width: 500px; width: 100%;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    position: relative;
    text-align: center;
  }

  .ninja-character {
    width: 100px; height: 100px;
    margin: 0 auto 30px;
    background: rgba(139, 178, 153, 0.1);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.05);
  }

  .login-title { 
    font-size: 34px; color: var(--forest); margin-bottom: 8px; 
    font-family: 'Playfair Display', serif; 
  }
  .login-sub { color: var(--text-light); font-size: 16px; margin-bottom: 40px; }

  .input-group { margin-bottom: 20px; text-align: left; }
  .input-label { 
    font-size: 12px; font-weight: 600; color: var(--sage); 
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; 
  }

  .input-field {
    width: 100%; padding: 16px 20px; border: 1px solid var(--border);
    border-radius: 18px; font-family: 'Outfit'; font-size: 15px;
    background: rgba(0,0,0,0.02); color: var(--text); outline: none;
  }
  body.dark-mode .input-field { background: rgba(255,255,255,0.05); }

  .input-field:focus { border-color: var(--gold); background: var(--bg-card); }

  .btn { 
    display: inline-flex; align-items: center; justify-content: center; 
    padding: 18px 32px; border-radius: 18px; font-family: 'Outfit'; 
    font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; 
    border: none; width: 100%;
  }

  .btn-primary { background: #1A3326; color: white; }
  body.dark-mode .btn-primary { background: var(--gold); color: #1A3326; }
  
  .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }

</style>
</head>
<body>

<header class="header">
  <a href="#" class="logo">
    <div style="width: 42px; height: 42px; display:flex; align-items:center; justify-content:center;">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" fill="#C9A84C" />
        <path d="M25 40 C25 25, 75 25, 75 40 L75 55 C75 70, 25 70, 25 55 Z" fill="#1A3326" />
        <rect x="35" y="45" width="30" height="8" rx="4" fill="#FDFCF9" opacity="0.9" />
        <circle cx="42" cy="49" r="2" fill="#1A3326" />
        <circle cx="58" cy="49" r="2" fill="#1A3326" />
      </svg>
    </div>
    <div>
      <div class="logo-text">Koduninja</div>
      <div class="logo-sub">Teenuste platvorm</div>
    </div>
  </a>
  <button class="theme-toggle" onclick="toggleTheme()">
    <span id="theme-icon">🌙</span> <span id="theme-text">Tume režiim</span>
  </button>
</header>

<div class="login-wrap">
  <div class="login-box">
    
    <div class="ninja-character">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width: 60px; height: 60px;">
        <path d="M30 90 Q50 85 70 90 L65 70 Q50 65 35 70 Z" fill="currentColor" />
        <circle cx="50" cy="45" r="25" fill="currentColor" />
        <path d="M32 40 Q50 35 68 40 Q68 50 50 50 Q32 50 32 40" fill="var(--bg-main)" />
        <circle cx="43" cy="44" r="2" fill="currentColor" />
        <circle cx="57" cy="44" r="2" fill="currentColor" />
        <path d="M70 35 L85 30 M70 35 L80 45" stroke="var(--gold)" stroke-width="3" stroke-linecap="round" />
      </svg>
    </div>

    <h1 class="login-title">Tere tulemast</h1>
    <p class="login-sub">Sinu Koduninja ootab sind.</p>
    
    <div class="input-group">
      <label class="input-label">Kasutajatunnus</label>
      <input class="input-field" type="email" placeholder="teie@email.ee" value="priit.kask@email.ee">
    </div>
    
    <div class="input-group">
      <label class="input-label">Parool</label>
      <input class="input-field" type="password" placeholder="••••••••">
    </div>
    
    <button class="btn btn-primary" onclick="alert('Sisselogimine aktiveeritud!')">Logi sisse →</button>
    
    <p style="margin-top: 30px; font-size: 14px; color: var(--text-light);">
      Pole veel liitunud? <a href="#" style="color: var(--gold); font-weight: 700; text-decoration: none;">Hakka ninjaks</a>
    </p>
  </div>
</div>

<script>
  function toggleTheme() {
    const body = document.body;
    const icon = document.getElementById('theme-icon');
    const text = document.getElementById('theme-text');
    
    body.classList.toggle('dark-mode');
    
    if (body.classList.contains('dark-mode')) {
      icon.textContent = '☀️';
      text.textContent = 'Hele režiim';
      localStorage.setItem('theme', 'dark');
    } else {
      icon.textContent = '🌙';
      text.textContent = 'Tume režiim';
      localStorage.setItem('theme', 'light');
    }
  }

  // Teema meeldejätmine
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode');
    document.getElementById('theme-icon').textContent = '☀️';
    document.getElementById('theme-text').textContent = 'Hele režiim';
  }
</script>

</body>
</html>
