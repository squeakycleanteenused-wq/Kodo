<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koduninja — Euroopa teenuste platvorm</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-main: #0F1713;
    --bg-card: rgba(24, 38, 32, 0.98);
    --forest: #1A3326;
    --gold: #C9A84C;
    --text: #EFEBE3;
    --text-light: #A0AEC0;
    --border: #1F2F27;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

  body {
    background-color: var(--bg-main);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(circle at 2px 2px, var(--forest) 1px, transparent 0);
    background-size: 40px 40px;
    transition: 0.5s;
  }

  /* LOGIN EKRAAN */
  #login-screen {
    display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 20px;
  }

  .login-card {
    background: var(--bg-card);
    padding: 50px;
    border-radius: 35px;
    width: 100%;
    max-width: 440px;
    border: 1px solid var(--border);
    text-align: center;
    backdrop-filter: blur(15px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }

  h1 { font-family: 'Playfair Display', serif; font-size: 42px; color: var(--gold); margin-bottom: 10px; }

  .input-group { text-align: left; margin-bottom: 20px; }
  .input-label { display: block; font-size: 14px; color: var(--gold); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  
  .input-field {
    width: 100%;
    padding: 18px;
    border-radius: 15px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: white;
    font-size: 16px;
    outline: none;
  }

  .btn-ninja {
    width: 100%;
    padding: 20px;
    border-radius: 15px;
    border: none;
    background: var(--gold);
    color: var(--forest);
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.3s;
  }
  .btn-ninja:hover { opacity: 0.9; transform: translateY(-2px); }

  /* DASHBOARD (Peidetud alguses) */
  #main-content { 
    display: none; 
    padding: 60px 20px; 
    max-width: 1100px; 
    margin: 0 auto; 
    animation: fadeIn 0.8s ease-out;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

  .card {
    background: var(--bg-card);
    padding: 50px 30px;
    border-radius: 30px;
    border: 1px solid var(--border);
    text-align: center;
    cursor: pointer;
    transition: 0.4s;
  }

  .card:hover { border-color: var(--gold); transform: translateY(-10px); background: #15231c; }
  .card span { font-size: 60px; display: block; margin-bottom: 20px; }
  .card h3 { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--gold); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div style="font-size: 50px; margin-bottom: 15px;">🥷</div>
    <h1>Koduninja</h1>
    <p style="color: var(--text-light); margin-bottom: 40px;">Eksklusiivne Euroopa teenuste platvorm</p>
    
    <div class="input-group">
      <span class="input-label">Kasutaja</span>
      <input id="email" class="input-field" type="email" value="ninja@demo.ee">
    </div>
    
    <div class="input-group">
      <span class="input-label">Parool</span>
      <input id="password" class="input-field" type="password" value="demo123">
    </div>
    
    <button class="btn-ninja" onclick="runDemo()">Logi sisse →</button>
  </div>
</div>

<div id="main-content">
  <div class="header">
    <div>
      <h2 style="font-family: 'Playfair Display', serif; font-size: 38px; color: var(--gold);">Tere tulemast, Ninja!</h2>
      <p style="color: var(--text-light); text-transform: uppercase; font-size: 12px; letter-spacing: 2px;">Teie personaalne töölaud</p>
    </div>
    <button onclick="location.reload()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:10px 20px; border-radius:12px; cursor:pointer; font-weight:700;">Logi välja</button>
  </div>

  <div class="grid">
    <div class="card" onclick="alert('Koristusteenused avanevad siin...')">
      <span>🧹</span>
      <h3>Koristus</h3>
      <p style="color: var(--text-light); margin-top: 15px;">Kodu, kontor ja suurpuhastus</p>
    </div>
    <div class="card" onclick="alert('Remondimeistrid avanevad siin...')">
      <span>🛠️</span>
      <h3>Remont</h3>
      <p style="color: var(--text-light); margin-top: 15px;">Meistrimehed ja pisiparandused</p>
    </div>
    <div class="card" onclick="alert('Aiatööde haldus avaneb siin...')">
      <span>🌿</span>
      <h3>Aiatööd</h3>
      <p style="color: var(--text-light); margin-top: 15px;">Muruniitmine ja haljastus</p>
    </div>
  </div>
</div>

<script>
  // See funktsioon teebki Koduninjast töötava demo
  function runDemo() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;

    // See on kontroll: kui parool on demo123, siis laseme sisse
    if (pass === 'demo123' || email === 'ninja@demo.ee') {
      // 1. Peidame login-vaate
      document.getElementById('login-screen').style.display = 'none';
      // 2. Näitame põhisisu
      document.getElementById('main-content').style.display = 'block';
      // 3. Muudame tausta veidi sügavamaks
      document.body.style.backgroundColor = "#0a0f0d";
    } else {
      alert("Demo parool on: demo123");
    }
  }
</script>

</body>
</html>
