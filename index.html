<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koduninja — Euroopa teenuste platvorm</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-main: #FDFCF9;
    --bg-card: rgba(255, 255, 255, 0.94);
    --forest: #1A3326;
    --sage: #5C8A6E;
    --gold: #C9A84C;
    --text: #2D3436; 
    --text-light: #636E72;
    --border: #EFEBE3;
    --pattern-color: #1A3326; 
    --pattern-opacity: 0.1; 
    --shadow: 0 10px 30px rgba(26,51,38,0.05);
  }

  body.dark-mode {
    --bg-main: #0F1713;
    --bg-card: rgba(24, 38, 32, 0.95);
    --text: #EFEBE3;
    --text-light: #A0AEC0;
    --border: #1F2F27;
    --pattern-color: #C9A84C;
    --pattern-opacity: 0.05;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: all 0.2s ease; }

  body {
    background-color: var(--bg-main);
    color: var(--text);
    min-height: 100vh;
    background-image: radial-gradient(circle at 2px 2px, var(--pattern-color) 1px, transparent 0);
    background-size: 40px 40px;
  }

  /* Login Screen */
  #login-screen { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; }
  .login-card {
    background: var(--bg-card); padding: 50px; border-radius: 40px;
    box-shadow: var(--shadow); width: 100%; max-width: 450px;
    border: 1px solid var(--border); text-align: center; backdrop-filter: blur(10px);
  }

  /* Main Content Area */
  #main-content { display: none; padding: 40px 20px; max-width: 1100px; margin: 0 auto; }
  
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 50px; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
  .card {
    background: var(--bg-card); padding: 40px 30px; border-radius: 30px;
    border: 1px solid var(--border); text-align: center; cursor: pointer;
    box-shadow: var(--shadow);
  }
  .card:hover { border-color: var(--gold); transform: translateY(-10px); }
  .card span { font-size: 50px; display: block; margin-bottom: 20px; }

  /* Pro Card Style (Vana koodi sisu uues kuues) */
  .pro-card {
    background: var(--bg-card); padding: 25px; border-radius: 20px;
    border: 1px solid var(--border); margin-bottom: 15px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 15px;
  }

  .btn {
    padding: 15px 30px; border-radius: 14px; border: none;
    font-weight: 700; cursor: pointer; background: var(--forest); color: white;
    text-transform: uppercase; letter-spacing: 1px;
  }
  body.dark-mode .btn { background: var(--gold); color: var(--forest); }

  .hidden { display: none !important; }
  h1, h2, h3 { font-family: 'Playfair Display', serif; }

  .theme-switch {
    position: fixed; top: 20px; right: 20px; padding: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; cursor: pointer; z-index: 100;
  }
</style>
</head>
<body class="dark-mode">

<button class="theme-switch" onclick="toggleTheme()">🌓</button>

<div id="login-screen">
  <div class="login-card">
    <h1 style="color: var(--gold);">Koduninja</h1>
    <p style="color: var(--text-light); margin-bottom: 40px;">Eksklusiivne teenuste platvorm</p>
    <input id="email" style="width:100%; padding:18px; margin-bottom:15px; border-radius:15px; border:1px solid var(--border); background:var(--bg-main); color:var(--text);" type="email" value="demo@klient.ee">
    <input id="password" style="width:100%; padding:18px; margin-bottom:25px; border-radius:15px; border:1px solid var(--border); background:var(--bg-main); color:var(--text);" type="password" value="demo123">
    <button class="btn" style="width:100%" onclick="handleLogin()">Logi sisse →</button>
  </div>
</div>

<div id="main-content">
  <div class="header">
    <div>
      <h2 style="font-size: 36px;">Tere tulemast!</h2>
      <p style="color: var(--gold); font-weight: 700; font-size: 14px;">ERAISIKU VAADE</p>
    </div>
    <button class="btn" style="padding: 10px 20px;" onclick="location.reload()">Logi välja</button>
  </div>

  <div id="cat-selector">
    <h3 style="margin-bottom: 30px;">Vali teenuse kategooria:</h3>
    <div class="grid">
      <div class="card" onclick="showPros('koristus')"><span>🧹</span><h3>Koristus</h3></div>
      <div class="card" onclick="showPros('ehitus')"><span>🛠️</span><h3>Remont</h3></div>
      <div class="card" onclick="showPros('transport')"><span>🚚</span><h3>Transport</h3></div>
    </div>
  </div>

  <div id="pro-area" class="hidden">
    <button onclick="backToCats()" style="background:none; border:none; color:var(--gold); cursor:pointer; margin-bottom:20px; font-weight:700;">← TAGASI</button>
    <h3 id="cat-title" style="margin-bottom:30px; font-size: 32px; color: var(--gold);">Teenusepakkujad</h3>
    <div id="pro-anchor"></div>
  </div>
</div>

<script>
  // KOGU VANA KODO SISU (Tegijad, tärnid, asukohad)
  const pakkujad = {
    'koristus': [
      { nimi: 'Puhastusproff OÜ', hind: 25, hinnang: 4.9, asukoht: 'Tallinn', kiir: '1h', emoji: '✨' },
      { nimi: 'KoduSära Mari', hind: 22, hinnang: 4.7, asukoht: 'Tartu', kiir: '2h', emoji: '🧹' }
    ],
    'ehitus': [
      { nimi: 'Meistrimees Ants', hind: 35, hinnang: 5.0, asukoht: 'Harjumaa', kiir: 'Plaanitav', emoji: '🔨' }
    ],
    'transport': [
      { nimi: 'Kiire Kaubik', hind: 30, hinnang: 4.6, asukoht: 'Eesti', kiir: '15min', emoji: '🚚' }
    ]
  };

  function handleLogin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
  }

  function showPros(cat) {
    document.getElementById('cat-selector').classList.add('hidden');
    document.getElementById('pro-area').classList.remove('hidden');
    document.getElementById('cat-title').innerText = cat.toUpperCase();
    
    const anchor = document.getElementById('pro-anchor');
    anchor.innerHTML = '';
    pakkujad[cat].forEach(p => {
      const finalPrice = (p.hind * 1.08).toFixed(2);
      anchor.innerHTML += `
        <div class="pro-card">
          <div style="display:flex; align-items:center; gap:20px;">
            <div style="width:60px; height:60px; background:var(--forest); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; border:1px solid var(--gold);">${p.emoji}</div>
            <div>
              <div style="font-weight:700; font-size:18px;">${p.nimi}</div>
              <div style="font-size:13px; color:var(--text-light);">📍 ${p.asukoht} · ⭐ ${p.hinnang} · ⏱️ ${p.kiir}</div>
            </div>
          </div>
          <div style="text-align:right;">
            <div style="color:var(--gold); font-weight:800; font-size:24px;">${finalPrice}€/h</div>
            <button class="btn" style="padding:8px 15px; font-size:12px; margin-top:5px;">VALI</button>
          </div>
        </div>`;
    });
  }

  function backToCats() {
    document.getElementById('pro-area').classList.add('hidden');
    document.getElementById('cat-selector').classList.remove('hidden');
  }

  function toggleTheme() {
    document.body.classList.toggle('dark-mode');
  }
</script>

</body>
</html>
